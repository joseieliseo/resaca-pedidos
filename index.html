<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Resaca — Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f2f2f2;
    --white: #ffffff;
    --blue: #003580;
    --blue-btn: #0071c2;
    --blue-btn-hover: #00487a;
    --text: #1a1a1a;
    --text-light: #555555;
    --border: #cccccc;
    --border-focus: #003580;
    --shadow: 0 2px 8px rgba(0,0,0,0.12);
    --green: #008234;
    --red: #cc0000;
    /* legacy aliases */
    --navy: #f2f2f2;
    --navy2: #ffffff;
    --teal: #0071c2;
    --teal-light: #0071c2;
    --gold: #003580;
    --gold-light: #0071c2;
    --cream: #1a1a1a;
    --gray: #555555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  #loginScreen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #f2f2f2;
    padding: 20px;
  }
  .login-box {
    background: #ffffff; border: 1px solid #cccccc;
    border-radius: 12px; padding: 40px 36px; width: 100%; max-width: 380px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo h1 { font-family: 'Playfair Display', serif; color: #003580; font-size: 2rem; letter-spacing: 2px; }
  .login-logo p { color: #555555; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
  .login-box label { display: block; font-size: 0.8rem; font-weight: 600; letter-spacing: 0; text-transform: none; color: #1a1a1a; margin-bottom: 6px; }
  .login-box input {
    width: 100%; padding: 12px 16px; background: #ffffff;
    border: 1px solid #cccccc; border-radius: 6px; color: #1a1a1a; font-size: 1rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; margin-bottom: 20px;
    transition: border-color 0.2s;
  }
  .login-box input:focus { outline: none; border-color: #003580; box-shadow: 0 0 0 2px rgba(0,53,128,0.15); }
  .btn-primary {
    width: 100%; padding: 14px; background: #0071c2; color: #ffffff;
    border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif;
    font-weight: 600; font-size: 0.95rem; cursor: pointer; letter-spacing: 1px;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-primary:hover { background: #00487a; transform: translateY(-1px); }
  .login-error { color: #e74c3c; font-size: 0.85rem; margin-top: 12px; text-align: center; display: none; }

  #app { display: none; }
  header {
    background: #003580; border-bottom: none;
    padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .header-logo { font-family: 'Playfair Display', serif; color: #ffffff; font-size: 1.3rem; letter-spacing: 1px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .user-badge {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px; padding: 6px 14px; font-size: 0.8rem; color: #ffffff;
  }
  .btn-logout {
    background: transparent; border: 1px solid rgba(138,155,176,0.3);
    color: rgba(255,255,255,0.8); padding: 6px 14px; border-radius: 20px;
    font-size: 0.8rem; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: #ffffff; color: #ffffff; background: rgba(255,255,255,0.1); }

  .nav-tabs {
    display: flex; background: #ffffff; border-bottom: 2px solid #cccccc;
    padding: 0 24px; gap: 4px; overflow-x: auto;
  }
  .nav-tab {
    padding: 14px 20px; font-size: 0.85rem; font-weight: 500; cursor: pointer;
    border-bottom: 2px solid transparent; color: #333333; white-space: nowrap;
    transition: all 0.2s; letter-spacing: 0.5px; background: none; border-top: none;
    border-left: none; border-right: none; font-family: 'DM Sans', sans-serif;
  }
  .nav-tab.active { color: #003580; border-bottom-color: #003580; font-weight: 600; }
  .nav-tab:hover { color: #003580; }

  main { padding: 24px; max-width: 900px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }

  .provider-block { margin-bottom: 32px; }
  .provider-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .provider-name { font-family: 'DM Sans', sans-serif; color: #003580; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .provider-count { background: #e8f0fe; border: 1px solid #c5d5f5; border-radius: 12px; padding: 3px 10px; font-size: 0.75rem; color: #003580; font-weight: 600; }

  .spirit-group { margin-bottom: 20px; }
  .spirit-type-label {
    font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase;
    color: #555555; margin-bottom: 10px; padding-left: 4px; font-weight: 600;
  }

  .product-row {
    display: grid; grid-template-columns: 1fr auto auto;
    align-items: center; gap: 12px;
    background: #ffffff; border: 1px solid #cccccc;
    border-radius: 8px; padding: 12px 16px; margin-bottom: 8px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .product-row:hover { border-color: #003580; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  .product-row.has-qty { border-color: #0071c2; background: #dbeafe; border-width: 2px; }
  .product-info { min-width: 0; }
  .product-brand { font-weight: 700; font-size: 0.9rem; color: #1a1a1a; }
  .product-desc { font-size: 0.78rem; color: #555555; margin-top: 2px; }
  .product-size {
    background: rgba(201,168,76,0.08); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px; font-size: 0.72rem; color: var(--gold);
    white-space: nowrap;
  }
  .qty-input {
    width: 48px; padding: 6px 4px; background: #ffffff;
    border: 1px solid #cccccc; border-radius: 6px; color: #1a1a1a; font-size: 1rem; font-weight: 600;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; text-align: center;
    transition: border-color 0.2s;
  }
  .qty-input:focus { outline: none; border-color: var(--teal-light); }

  .pedido-footer {
    position: sticky; bottom: 0; background: #ffffff;
    border-top: 2px solid #cccccc; padding: 16px 24px; box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }
  .pedido-summary { font-size: 0.85rem; color: #1a1a1a; font-weight: 500; }
  .pedido-summary span { color: #003580; font-weight: 700; }
  .btn-enviar {
    background: #0071c2; color: white; border: none; border-radius: 6px;
    padding: 12px 28px; font-family: 'DM Sans', sans-serif; font-weight: 600;
    font-size: 0.9rem; cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s;
  }
  .btn-enviar:hover { background: #00487a; transform: translateY(-1px); }
  .btn-enviar:disabled { background: #aaaaaa; cursor: not-allowed; transform: none; }

  .orders-grid { display: flex; flex-direction: column; gap: 16px; }
  .order-card {
    background: #ffffff; border: 1px solid #cccccc;
    border-radius: 8px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  .order-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; background: #f2f2f2;
    border-bottom: 1px solid #e1e8f0; cursor: pointer;
    flex-wrap: wrap; gap: 8px;
  }
  .order-card-title { font-weight: 700; color: #003580; font-size: 0.95rem; }
  .order-card-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .badge { border-radius: 12px; padding: 3px 10px; font-size: 0.72rem; font-weight: 500; }
  .badge-user { background: #e8f0fe; color: #003580; border: 1px solid #c5d5f5; }
  .badge-date { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
  .badge-provider { background: #f2f2f2; color: #333333; border: 1px solid #cccccc; }
  .order-card-body { padding: 16px 20px; display: none; }
  .order-card-body.open { display: block; }
  .order-items-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .order-items-table th {
    text-align: left; padding: 8px 12px; font-size: 0.7rem; letter-spacing: 2px;
    text-transform: uppercase; color: #605e5c; border-bottom: 2px solid #e1e8f0;
  }
  .order-items-table td { padding: 10px 12px; border-bottom: 1px solid #e1e8f0; color: #1a1a2e; }
  .order-items-table tr:last-child td { border-bottom: none; }
  .qty-badge { background: rgba(42,127,127,0.2); color: var(--teal-light); border-radius: 6px; padding: 2px 8px; font-weight: 600; }
  .btn-export {
    background: transparent; border: 1px solid #0071c2; color: #0071c2;
    padding: 8px 18px; border-radius: 6px; font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem; cursor: pointer; font-weight: 500; transition: all 0.2s;
    margin-top: 12px;
  }
  .btn-export:hover { background: #0071c2; color: #ffffff; }

  .admin-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
  }
  .btn-add {
    background: #0071c2; color: white; border: none; border-radius: 6px;
    padding: 10px 20px; font-family: 'DM Sans', sans-serif; font-weight: 600;
    font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
  }
  .btn-add:hover { background: #00487a; }
  .products-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .products-table th {
    text-align: left; padding: 10px 12px; font-size: 0.7rem; letter-spacing: 2px;
    text-transform: uppercase; color: #555555; border-bottom: 2px solid #003580;
  }
  .products-table td { padding: 10px 12px; border-bottom: 1px solid #e1e8f0; color: #1a1a2e; vertical-align: middle; }
  .products-table tr:hover td { background: #f2f2f2; }
  .btn-edit, .btn-delete {
    border: none; border-radius: 6px; padding: 5px 12px;
    font-family: 'DM Sans', sans-serif; font-size: 0.78rem; cursor: pointer;
    font-weight: 500; transition: all 0.2s;
  }
  .btn-edit { background: rgba(42,127,127,0.2); color: var(--teal-light); margin-right: 6px; }
  .btn-edit:hover { background: var(--teal); color: white; }
  .btn-delete { background: rgba(192,57,43,0.15); color: #e74c3c; }
  .btn-delete:hover { background: var(--red); color: white; }
  .active-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .active-dot.on { background: var(--green); }
  .active-dot.off { background: var(--gray); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(13,27,42,0.85);
    align-items: center; justify-content: center;
    z-index: 1000; padding: 20px; display: none;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #ffffff; border: 1px solid #cccccc; border-radius: 10px;
    padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  }
  .modal h3 { font-family: 'DM Sans', sans-serif; color: #003580; margin-bottom: 24px; font-size: 1.2rem; font-weight: 700; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); margin-bottom: 8px; }
  .form-group input, .form-group select {
    width: 100%; padding: 10px 14px; background: #ffffff;
    border: 1px solid #cccccc; border-radius: 6px; color: #1a1a1a;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--gold); }
  .form-group select option { background: #ffffff; }
  .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
  .btn-cancel {
    background: transparent; border: 1px solid rgba(138,155,176,0.3);
    color: var(--gray); padding: 10px 20px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer;
  }
  .btn-save {
    background: #0071c2; color: #ffffff; border: none; border-radius: 6px;
    padding: 10px 24px; font-family: 'DM Sans', sans-serif;
    font-weight: 600; font-size: 0.85rem; cursor: pointer;
  }

  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #003580; color: white; padding: 12px 24px;
    border-radius: 8px; font-size: 0.9rem; font-weight: 500;
    box-shadow: var(--shadow); z-index: 2000; opacity: 0;
    transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--gray); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }

  .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-select {
    padding: 8px 14px; background: #ffffff;
    border: 1px solid #cccccc; border-radius: 6px; color: #1a1a1a;
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
  }
  .filter-select option { background: #ffffff; }

  /* DEADLINE BANNER */
  .deadline-banner {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 18px; border-radius: 10px; margin-bottom: 20px;
    font-size: 0.85rem; font-weight: 500;
  }
  .deadline-banner.ok { background: #e6f4ea; border: 1px solid #b7dfbe; color: #107c10; }
  .deadline-banner.warning { background: #fff4ce; border: 1px solid #f9c84e; color: #8a5e00; }
  .deadline-banner.closed { background: #fde7e9; border: 1px solid #f4a7ab; color: #d13438; }

  /* CONFIRM MODAL */
  .confirm-items { max-height: 320px; overflow-y: auto; margin: 16px 0; }
  .confirm-provider { font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--teal-light); margin: 14px 0 8px; }
  .confirm-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
  .confirm-row:last-child { border-bottom: none; }
  .confirm-prod { color: var(--cream); }
  .confirm-prod span { color: var(--gray); font-size: 0.78rem; margin-left: 6px; }
  .confirm-qty { background: rgba(42,127,127,0.25); color: var(--teal-light); border-radius: 6px; padding: 2px 10px; font-weight: 700; }

  /* NOTES FIELD */
  .notes-area {
    width: 100%; padding: 10px 14px; background: #ffffff;
    border: 1px solid #cccccc; border-radius: 6px; color: #1a1a1a;
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; resize: vertical;
    min-height: 64px; margin-top: 8px;
  }
  .notes-area:focus { outline: none; border-color: var(--teal-light); }
  .notes-area::placeholder { color: var(--gray); }
  .notes-label { font-size: 0.8rem; font-weight: 600; letter-spacing: 0; text-transform: none; color: #1a1a1a; margin-top: 20px; display: block; }

  /* LAST ORDER HINT */
  .last-order-hint { font-size: 0.7rem; color: #0071c2; margin-top: 3px; font-weight: 500; }

  /* TYPE FILTER TABS */
  .type-filter-wrap {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .type-btn {
    padding: 7px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
    border: 1px solid #cccccc; background: #ffffff;
    color: #333333; white-space: nowrap;
  }
  .type-btn:hover { border-color: #003580; color: #003580; }
  .type-btn.active {
    background: #003580; border-color: #003580;
    color: #ffffff;
  }
  .type-btn .count {
    background: rgba(0,0,0,0.08); border-radius: 10px;
    padding: 1px 6px; font-size: 0.68rem; margin-left: 4px;
  }
  .type-btn.active .count { background: rgba(255,255,255,0.25); }

  /* QTY STEPPER */
  .qty-stepper { display: flex; align-items: center; gap: 6px; }
  .qty-btn {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: #f2f2f2; color: #0078d4; font-size: 1.1rem; border-color: #d0e4f5;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', sans-serif; transition: all 0.15s; line-height: 1;
    flex-shrink: 0;
  }
  .qty-btn:hover { background: #0071c2; border-color: #0071c2; color: #ffffff; }
  .qty-btn:active { transform: scale(0.92); }
  .qty-input { width: 48px; padding: 6px 4px; }

  /* tighter product row */
  .product-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .product-size-inline {
    background: #003580; border: none;
    border-radius: 4px; padding: 2px 7px; font-size: 0.68rem; color: #ffffff; font-weight: 600;
    white-space: nowrap; flex-shrink: 0;
  }

  @media (max-width: 600px) {
    main { padding: 16px; }
    .product-row { grid-template-columns: 1fr auto; }
    .product-size { display: none; }
    .login-box { padding: 32px 24px; }
    header { padding: 12px 16px; }
    .header-logo { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <h1>La Resaca</h1>
      <p>Seafood Bar — Pedidos</p>
    </div>
    <label for="username">Usuario</label>
    <input type="text" id="username" placeholder="Tu usuario" autocomplete="username">
    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn-primary" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="loginError">Usuario o contraseña incorrectos</div>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-logo">La Resaca</div>
    <div class="header-right">
      <div class="user-badge" id="userBadge">—</div>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </header>
  <div class="nav-tabs" id="navTabs"></div>
  <main>
    <div class="section" id="sectionOrder">
      <div id="deadlineBanner"></div>
      <div class="type-filter-wrap" id="typeFilterWrap"></div>
      <div id="orderProviders"></div>
    </div>
    <div class="section" id="sectionAdminOrders">
      <div class="filter-bar">
        <select class="filter-select" id="filterWeek" onchange="renderAdminOrders()">
          <option value="">Todas las semanas</option>
        </select>
        <select class="filter-select" id="filterProvider" onchange="renderAdminOrders()">
          <option value="">Todos los proveedores</option>
          <option value="Southern Glazer's">Southern Glazer's</option>
          <option value="Breakthru">Breakthru</option>
          <option value="Crest Beverage">Crest Beverage</option>
        </select>
      </div>
      <div class="orders-grid" id="ordersGrid"></div>
    </div>
    <div class="section" id="sectionAdminProducts">
      <div class="admin-toolbar">
        <div style="color:var(--gray);font-size:0.85rem;" id="productCount"></div>
        <button class="btn-add" onclick="openProductModal()">+ Agregar Producto</button>
      </div>
      <div style="overflow-x:auto;">
        <table class="products-table" id="productsTable">
          <thead><tr><th>Activo</th><th>Proveedor</th><th>Tipo</th><th>Marca</th><th>Descripción</th><th>Tamaño</th><th>Unidad</th><th>Costo</th><th>Acciones</th></tr></thead>
          <tbody id="productsBody"></tbody>
        </table>
      </div>
    </div>
  </main>
  <div class="pedido-footer" id="pedidoFooter" style="display:none;">
    <div class="pedido-summary">Items seleccionados: <span id="itemCount">0</span></div>
    <button class="btn-enviar" id="btnEnviar" onclick="submitOrder()" disabled>Enviar Pedido</button>
  </div>
</div>

<div class="modal-overlay" id="productModal">
  <div class="modal">
    <h3 id="modalTitle">Agregar Producto</h3>
    <div class="form-group"><label>Proveedor</label>
      <select id="mpProvider"><option value="Southern Glazer's">Southern Glazer's</option><option value="Breakthru">Breakthru</option><option value="Crest Beverage">Crest Beverage</option></select></div>
    <div class="form-group"><label>Tipo de Spirit</label>
      <select id="mpType"><option>Beer</option><option>Mezcal</option><option>Rum</option><option>Tequila</option><option>Whiskey/Bourbon</option><option>Gin</option><option>Vodka</option><option>Liqueur</option><option>Vermouth</option><option>Wine</option><option>Mixer</option><option>Water</option><option>Other</option></select></div>
    <div class="form-group"><label>Marca</label><input type="text" id="mpBrand" placeholder="Ej: DON JULIO"></div>
    <div class="form-group"><label>Descripción</label><input type="text" id="mpDesc" placeholder="Ej: TEQUILA BLANCO"></div>
    <div class="form-group"><label>Presentación</label><input type="text" id="mpSize" placeholder="Ej: 750ML"></div>
    <div class="form-group"><label>Unidad de Compra</label>
      <select id="mpUnit"><option value="Caja">Caja</option><option value="Botella">Botella</option><option value="Six-pack">Six-pack</option><option value="Pack">Pack</option><option value="Keg">Keg</option></select></div>

// Deadline: Tuesday 5pm (day 2 = Tuesday, hour 17)
const DEADLINE_DAY = 2, DEADLINE_HOUR = 17;

function getCurrentOrderWeek() {
  // Returns the week label for the current order period
  // Week runs Wed 5pm → Tue 5pm
  // If before Tuesday 5pm → current Mon-Sun week
  // If after Tuesday 5pm → next Mon-Sun week
  const now = new Date();
  const day = now.getDay(); // 0=Sun,1=Mon,2=Tue...
  const hour = now.getHours();

  const pastDeadline = (day === DEADLINE_DAY && hour >= DEADLINE_HOUR) ||
                       (day > DEADLINE_DAY);
  const isSunday = day === 0;

  // Find Monday of current week
  let monday = new Date(now);
  const diffToMonday = (day === 0) ? -6 : 1 - day;
  monday.setDate(now.getDate() + diffToMonday);
  monday.setHours(0,0,0,0);

  // If past deadline (Wed/Thu/Fri/Sat/Sun or Tue after 5pm), jump to next week
  if (pastDeadline || day === 3 || day === 4 || day === 5 || day === 6 || isSunday) {
    // Check if we're past Tuesday of this week
    const thisTuesday = new Date(monday);
    thisTuesday.setDate(monday.getDate() + 1);
    thisTuesday.setHours(DEADLINE_HOUR, 0, 0, 0);
    if (now >= thisTuesday) {
      monday.setDate(monday.getDate() + 7);
    }
  }

  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);

  const fmt = (d) => d.toLocaleDateString('es-MX', { day:'2-digit', month:'short' });
  return {
    label: `${fmt(monday)} – ${fmt(sunday)}`,
    monday, sunday
  };
}

function getOrderWeekKey() {
  return getCurrentOrderWeek().label;
}

function loadState() {

    products = p ? JSON.parse(p) : JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
    const o = localStorage.getItem('lr_orders');
    orders = o ? JSON.parse(o) : [];

    nextId = n ? parseInt(n) : 100;
  } catch(e) { products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS)); orders = []; }
}

function saveOrders() { localStorage.setItem('lr_orders', JSON.stringify(orders)); }

// ─── DEADLINE ────────────────────────────────────────────────────────────────
function getDeadlineStatus() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun,1=Mon,2=Tue...
  const hour = now.getHours();
  const min = now.getMinutes();
  // Days until Tuesday
  let daysUntil = (DEADLINE_DAY - day + 7) % 7;
  const pastDeadlineToday = (day === DEADLINE_DAY && (hour > DEADLINE_HOUR || (hour === DEADLINE_HOUR && min === 0)));
  if (pastDeadlineToday) daysUntil = 7;
  if (daysUntil === 0 && !pastDeadlineToday) {
    // Today is Tuesday, before 5pm
    const hoursLeft = DEADLINE_HOUR - hour;
    if (hoursLeft <= 2) return { cls: 'warning', msg: `⚠️ Límite hoy martes a las 5:00 PM — quedan ${hoursLeft}h ${60-min}min` };
    return { cls: 'warning', msg: `⏰ Límite hoy martes a las 5:00 PM` };
  }
  if (daysUntil === 1) return { cls: 'ok', msg: `✅ Límite: mañana martes a las 5:00 PM` };
  if (pastDeadlineToday) return { cls: 'closed', msg: `🔒 Límite cerrado — el pedido de esta semana ya fue enviado` };
  return { cls: 'ok', msg: `✅ Límite de pedido: martes a las 5:00 PM (faltan ${daysUntil} días)` };
}

function renderDeadlineBanner() {
  const s = getDeadlineStatus();
  const week = getCurrentOrderWeek();
  const el = document.getElementById('deadlineBanner');
  el.innerHTML = `
    <div style="background:#003580;color:#ffffff;border-radius:8px;padding:12px 18px;margin-bottom:10px;display:flex;align-items:center;gap:10px;font-size:0.9rem;font-weight:600;">
      📅 Semana de pedido: <span style="background:rgba(255,255,255,0.2);border-radius:6px;padding:2px 10px;margin-left:4px">${week.label}</span>
    </div>
    <div class="deadline-banner ${s.cls}">${s.msg}</div>`;
}

function getLastOrderQty(productId) {
  // Find the most recent order from THIS user that includes this product
  for (const order of orders) {
    if (order.user !== currentUser.key) continue;
    const item = order.items.find(i => i.id === productId);
    if (item) return item.qty;
  }
  return null;
}

  }
}

  currentUser = null; quantities = {}; notes = {};

function initApp() {
  loadState();

  showSection(currentUser.role === 'admin' ? 'sectionAdminOrders' : 'sectionOrder');
}

function buildNav() {
  const tabs = document.getElementById('navTabs');
  tabs.innerHTML = '';
  const navItems = currentUser.role === 'admin'
    ? [['sectionAdminOrders','📋 Pedidos'],['sectionAdminProducts','📦 Productos']]
    : [['sectionOrder','🛒 Nuevo Pedido']];
  navItems.forEach(([id, label]) => {
    const btn = document.createElement('button');
    btn.className = 'nav-tab'; btn.textContent = label;
    btn.onclick = () => showSection(id);
    btn.dataset.section = id;
    tabs.appendChild(btn);
  });
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.section === id));
  document.getElementById(id).classList.add('active');
  document.getElementById('pedidoFooter').style.display = id === 'sectionOrder' ? 'flex' : 'none';
  if (id === 'sectionOrder') { activeTypeFilter = 'all'; renderOrder(); }
  if (id === 'sectionAdminOrders') renderAdminOrders();
  if (id === 'sectionAdminProducts') renderAdminProducts();
}

    const btn = document.createElement('button');
    btn.className = 'type-btn' + (activeTypeFilter === type ? ' active' : '');
    btn.innerHTML = `${type} <span class="count">${typeCounts[type]}</span>`;
    btn.onclick = () => { activeTypeFilter = type; renderOrder(); };
    wrap.appendChild(btn);
  });
}

function renderOrder() {
  renderDeadlineBanner();
  renderTypeFilters();
  const container = document.getElementById('orderProviders');
  container.innerHTML = '';

  let active = products.filter(p => p.active);
  if (activeTypeFilter !== 'all') active = active.filter(p => p.type === activeTypeFilter);

  if (!active.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No hay productos en esta categoría</p></div>';
    updateFooter(); return;
  }

  const providers = [...new Set(active.map(p => p.provider))];

  providers.forEach(prov => {
    const provProds = active.filter(p => p.provider === prov);
    const block = document.createElement('div');
    block.className = 'provider-block';
    block.innerHTML = `<div class="provider-header"><div class="provider-name">${prov}</div><div class="provider-count">${provProds.length} productos</div></div>`;

    const byType = {};
    TYPE_ORDER.forEach(t => { const items = provProds.filter(p => p.type === t); if (items.length) byType[t] = items; });

    Object.entries(byType).forEach(([type, items]) => {
      const group = document.createElement('div');
      group.className = 'spirit-group';
      // Only show type label when showing all types
      if (activeTypeFilter === 'all') group.innerHTML = `<div class="spirit-type-label">${type}</div>`;
      items.sort((a,b) => a.brand.localeCompare(b.brand)).forEach(prod => {
        const lastQty = getLastOrderQty(prod.id);
        const hint = lastQty !== null ? `<div class="last-order-hint">últ. pedido: ${lastQty}</div>` : '';
        const row = document.createElement('div');
        row.className = 'product-row' + (quantities[prod.id] > 0 ? ' has-qty' : '');
        row.id = 'row-' + prod.id;
        row.innerHTML = `
          <div class="product-left">
            <div class="product-info">
              <div class="product-brand">${prod.brand} <span class="product-size-inline">${prod.size}</span>${prod.unit ? '<span style="background:#e8f0fe;border:1px solid #c5d5f5;border-radius:4px;padding:1px 6px;font-size:0.65rem;color:#003580;font-weight:600;margin-left:4px">'+prod.unit+'</span>' : ''}</div>
              <div class="product-desc">${prod.desc}${prod.cost > 0 ? ' · <span style="color:var(--gold)">$'+prod.cost.toFixed(2)+'</span>' : ''}</div>
              ${hint}
            </div>
          </div>
          <div class="qty-stepper">
            <button class="qty-btn" onclick="stepQty(${prod.id}, -1)">−</button>
            <input class="qty-input" type="number" min="0" max="99" placeholder="0"
              id="qty-${prod.id}"
              value="${quantities[prod.id] || ''}"
              onchange="updateQty(${prod.id}, this.value)"
              oninput="updateQty(${prod.id}, this.value)">
            <button class="qty-btn" onclick="stepQty(${prod.id}, 1)">+</button>
          </div>`;
        group.appendChild(row);
      });
      block.appendChild(group);
    });

    // Notes field per provider — only show when all types or single provider visible
    const notesDiv = document.createElement('div');
    notesDiv.innerHTML = `
      <label class="notes-label">📝 Notas para ${prov}</label>
      <textarea class="notes-area" placeholder="Productos nuevos, preguntas al proveedor, urgencias..."
        oninput="notes['${prov}']=this.value">${notes[prov]||''}</textarea>`;
    block.appendChild(notesDiv);
    container.appendChild(block);
  });
  updateFooter();
}

function stepQty(id, delta) {
  const current = quantities[id] || 0;
  const next = Math.max(0, Math.min(99, current + delta));
  const input = document.getElementById('qty-' + id);
  if (input) input.value = next || '';
  updateQty(id, next);
}

function updateQty(id, val) {
  const n = parseInt(val) || 0;
  if (n > 0) quantities[id] = n; else delete quantities[id];
  const row = document.getElementById('row-' + id);
  if (row) row.className = 'product-row' + (n > 0 ? ' has-qty' : '');
  updateFooter();
}

function updateFooter() {
  const count = Object.values(quantities).filter(v => v > 0).length;
  document.getElementById('itemCount').textContent = count;
  document.getElementById('btnEnviar').disabled = count === 0;
}

function submitOrder() {
  if (!Object.keys(quantities).length) return;
  const byProvider = {};
  Object.entries(quantities).forEach(([id, qty]) => {
    const prod = products.find(p => p.id == id);
    if (!prod) return;
    if (!byProvider[prod.provider]) byProvider[prod.provider] = [];
    byProvider[prod.provider].push({ ...prod, qty });
  });
  let html = '';
  Object.entries(byProvider).forEach(([prov, items]) => {
    html += `<div class="confirm-provider">📦 ${prov}</div>`;
    items.sort((a,b) => a.brand.localeCompare(b.brand)).forEach(i => {
      html += `<div class="confirm-row">
        <div class="confirm-prod">${i.brand}<span>${i.desc} · ${i.size}</span></div>
        <span class="confirm-qty">${i.qty}</span>
      </div>`;
    });
    if (notes[prov]) {
      html += `<div style="margin-top:8px;padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:6px;font-size:0.78rem;color:var(--gray)">📝 ${notes[prov]}</div>`;
    }
  });
  document.getElementById('confirmSummary').innerHTML = html;
  document.getElementById('confirmModal').classList.add('open');
}

function closeConfirmModal() { document.getElementById('confirmModal').classList.remove('open'); }

function confirmAndSubmit() {
  closeConfirmModal();
  const now = new Date();
  const dateStr = getOrderWeekKey();
  const timeStr = now.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
  const byProvider = {};
  Object.entries(quantities).forEach(([id, qty]) => {
    const prod = products.find(p => p.id == id);
    if (!prod) return;
    if (!byProvider[prod.provider]) byProvider[prod.provider] = [];
    byProvider[prod.provider].push({ ...prod, qty });
  });
  Object.entries(byProvider).forEach(([prov, items]) => {
    const existing = orders.find(o => o.user === currentUser.key && o.provider === prov && o.date === dateStr);
    if (existing) {
      items.forEach(newItem => {
        const ex = existing.items.find(i => i.id === newItem.id);
        if (ex) ex.qty += newItem.qty;
        else existing.items.push(newItem);
      });
      if (notes[prov]) existing.notes = (existing.notes ? existing.notes + ' / ' : '') + notes[prov];
    } else {
      orders.unshift({
        id: Date.now() + Math.random(),
        user: currentUser.key,
        userName: currentUser.name,
        provider: prov,
        date: dateStr,
        time: timeStr,
        notes: notes[prov] || '',
        items
      });
    }
  });
  saveOrders();
  quantities = {}; notes = {};
  renderOrder();
  showToast('✅ Pedido enviado correctamente');
}

// ─── ADMIN ORDERS ─────────────────────────────────────────────────────────────
function renderAdminOrders() {
  const grid = document.getElementById('ordersGrid');
  const fp = document.getElementById('filterProvider').value;
  const fw = document.getElementById('filterWeek').value;

  // Populate week dropdown
  const weekSel = document.getElementById('filterWeek');
  const currentVal = weekSel.value;
  const allWeeks = [...new Set(orders.map(o => o.date))].sort().reverse();
  weekSel.innerHTML = '<option value="">Todas las semanas</option>';
  allWeeks.forEach(w => {
    const opt = document.createElement('option');
    opt.value = w; opt.textContent = `Semana ${w}`;
    if (w === currentVal) opt.selected = true;
    weekSel.appendChild(opt);
  });

  if (!orders.length) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>No hay pedidos registrados</p></div>';
    return;
  }

  const consolidated = {};
  orders.forEach(order => {
    const key = order.date + '||' + order.provider;
    if (fp && order.provider !== fp) return;
    if (fw && order.date !== fw) return;
    if (!consolidated[key]) {
      consolidated[key] = { date: order.date, provider: order.provider, users: [], itemMap: {}, notesList: [] };
    }
    const c = consolidated[key];
    if (!c.users.includes(order.userName)) c.users.push(order.userName);
    if (order.notes) c.notesList.push(`${order.userName.split(' ')[0]}: ${order.notes}`);
    order.items.forEach(item => {
      if (!c.itemMap[item.id]) c.itemMap[item.id] = { ...item, qty: 0, byUser: {} };
      c.itemMap[item.id].qty += item.qty;
      c.itemMap[item.id].byUser[order.userName] = (c.itemMap[item.id].byUser[order.userName] || 0) + item.qty;
    });
  });

  const entries = Object.values(consolidated).sort((a,b) => b.date.localeCompare(a.date));

  if (!entries.length) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>No hay pedidos para este proveedor</p></div>';
    return;
  }

  grid.innerHTML = '';
  entries.forEach((c, idx) => {
    const items = Object.values(c.itemMap).sort((a,b) => {
      if (a.type !== b.type) return TYPE_ORDER.indexOf(a.type) - TYPE_ORDER.indexOf(b.type);
      return a.brand.localeCompare(b.brand);
    });
    const allUsers = c.users;
    const total = items.reduce((s, i) => s + (i.cost || 0) * i.qty, 0);
    const card = document.createElement('div');
    card.className = 'order-card';

    const userCols = allUsers.map(u => `<th style="color:var(--teal-light)">${u.split(' ')[0]}</th>`).join('');
    const itemRows = items.map(i => {
      const userQtys = allUsers.map(u => `<td style="text-align:center">${i.byUser[u] ? '<span class="qty-badge">'+i.byUser[u]+'</span>' : '<span style="color:var(--gray)">—</span>'}</td>`).join('');
      return `<tr>
        <td style="color:var(--teal-light);font-size:0.78rem">${i.type}</td>
        <td style="font-weight:600">${i.brand}</td>
        <td style="color:var(--gray)">${i.desc}</td>
        <td><span style="background:rgba(201,168,76,0.08);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:0.72rem;color:var(--gold)">${i.size}</span></td>
        ${userQtys}
        <td style="text-align:center"><span style="background:rgba(42,127,127,0.35);color:#7de8e8;border-radius:6px;padding:2px 10px;font-weight:700">${i.qty}</span></td>
        ${total > 0 ? `<td style="color:var(--gold)">$${((i.cost||0)*i.qty).toFixed(2)}</td>` : ''}
      </tr>`;
    }).join('');

    const notesHtml = c.notesList.length
      ? `<div style="margin-top:14px;padding:10px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;font-size:0.82rem;color:var(--gray)">
          <span style="color:var(--gold);font-size:0.7rem;letter-spacing:2px;text-transform:uppercase">Notas</span><br>
          ${c.notesList.map(n => `<div style="margin-top:6px">📝 ${n}</div>`).join('')}
        </div>` : '';

    card.innerHTML = `
      <div class="order-card-header" onclick="toggleOrder(this)">
        <div class="order-card-title">${c.provider}</div>
        <div class="order-card-meta">
          <span class="badge badge-date">📅 Sem. ${c.date}</span>
          <span class="badge badge-provider">${items.length} productos</span>
          ${allUsers.map(u => `<span class="badge badge-user">${u.split(' ')[0]}</span>`).join('')}
          ${total > 0 ? `<span class="badge" style="background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid var(--border)">$${total.toFixed(2)}</span>` : ''}
        </div>
      </div>
      <div class="order-card-body">
        <div style="overflow-x:auto">
        <table class="order-items-table">
          <thead><tr><th>Tipo</th><th>Marca</th><th>Descripción</th><th>Tamaño</th>${userCols}<th style="text-align:center">Total</th>${total>0?'<th>Subtotal</th>':''}</tr></thead>
          <tbody>${itemRows}</tbody>
        </table>
        </div>
        ${notesHtml}
        <button class="btn-export" onclick="exportConsolidated(${idx})">⬇ Exportar Excel</button>
      </div>`;
    card.dataset.idx = idx;
    grid.appendChild(card);
  });
  window._consolidatedEntries = entries;
}

function toggleOrder(header) { header.nextElementSibling.classList.toggle('open'); }

function exportConsolidated(idx) {
  const c = window._consolidatedEntries[idx];
  if (!c) return;
  const items = Object.values(c.itemMap).sort((a,b) => {
    if (a.type !== b.type) return TYPE_ORDER.indexOf(a.type) - TYPE_ORDER.indexOf(b.type);
    return a.brand.localeCompare(b.brand);
  });
  const userCols = c.users.join('\t');
  let csv = `Proveedor\tFecha\tTipo\tMarca\tDescripcion\tTamano\t${userCols}\tTotal\tCosto\tSubtotal\n`;
  items.forEach(i => {
    const uQtys = c.users.map(u => i.byUser[u] || 0).join('\t');
    csv += `${c.provider}\t${c.date}\t${i.type}\t${i.brand}\t${i.desc}\t${i.size}\t${uQtys}\t${i.qty}\t${i.cost||0}\t${((i.cost||0)*i.qty).toFixed(2)}\n`;
  });
  if (c.notesList.length) csv += `\nNotas\t${c.notesList.join(' | ')}\n`;

  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if (isMobile) {
    // Mobile: copy to clipboard
    navigator.clipboard.writeText(csv).then(() => {
      showToast('📋 Copiado al portapapeles — pégalo en Google Sheets o Numbers');
    }).catch(() => {
      // Fallback: show in a textarea the user can copy manually
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(13,27,42,0.92);z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px';
      modal.innerHTML = `<div style="background:#1a2e45;border:1px solid rgba(201,168,76,0.25);border-radius:16px;padding:24px;width:100%;max-width:480px">
        <div style="font-family:Playfair Display,serif;color:#c9a84c;margin-bottom:16px;font-size:1.1rem">Copiar Pedido</div>
        <p style="font-size:0.82rem;color:#8a9bb0;margin-bottom:12px">Selecciona todo el texto y cópialo:</p>
        <textarea readonly style="width:100%;height:200px;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.25);border-radius:8px;color:#f5f0e8;font-size:0.75rem;padding:10px;font-family:monospace" onclick="this.select()">${csv}</textarea>
        <button onclick="this.closest('div').parentElement.remove()" style="margin-top:16px;width:100%;padding:12px;background:#c9a84c;color:#0d1b2a;border:none;border-radius:8px;font-weight:600;font-size:0.9rem;cursor:pointer">Cerrar</button>
      </div>`;
      document.body.appendChild(modal);
    });
  } else {
    // Desktop: trigger download
    const blob = new Blob([csv], { type: 'text/tab-separated-values' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `pedido_${c.provider.replace(/\s/g,'_')}_${c.date.replace(/\//g,'-')}.xls`;
    a.click();
  }
}

// ─── ADMIN PRODUCTS ──────────────────────────────────────────────────────────
function renderAdminProducts() {
  document.getElementById('productCount').textContent = `${products.filter(p=>p.active).length} activos · ${products.length} total`;
  const tbody = document.getElementById('productsBody');
  tbody.innerHTML = '';
  const sorted = [...products].sort((a,b) => {
    if (a.provider !== b.provider) return a.provider.localeCompare(b.provider);
    if (TYPE_ORDER.indexOf(a.type) !== TYPE_ORDER.indexOf(b.type)) return TYPE_ORDER.indexOf(a.type) - TYPE_ORDER.indexOf(b.type);
    return a.brand.localeCompare(b.brand);
  });
  sorted.forEach(prod => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="active-dot ${prod.active?'on':'off'}"></span></td>
      <td style="color:var(--gray);font-size:0.8rem">${prod.provider}</td>
      <td style="color:var(--teal-light);font-size:0.8rem">${prod.type}</td>
      <td style="font-weight:600">${prod.brand}</td>
      <td style="color:var(--gray)">${prod.desc}</td>
      <td><span style="background:#003580;border:none;border-radius:4px;padding:2px 8px;font-size:0.72rem;color:#ffffff;font-weight:600">${prod.size}</span></td>
      <td style="color:#555555;font-size:0.8rem">${prod.unit || '—'}</td>
      <td style="color:#003580;font-weight:600">${prod.cost > 0 ? '$'+prod.cost.toFixed(2) : '—'}</td>
      <td>
        <button class="btn-edit" onclick="openProductModal(${prod.id})">Editar</button>
        <button class="btn-delete" onclick="toggleActive(${prod.id})">${prod.active?'Desactivar':'Activar'}</button>
      </td>`;
    tbody.appendChild(tr);
  });
}

function toggleActive(id) {
  const p = products.find(x => x.id === id);
  if (p) { p.active = !p.active; saveProducts(); renderAdminProducts(); }
}

function openProductModal(id = null) {
  editingProductId = id;
  document.getElementById('modalTitle').textContent = id ? 'Editar Producto' : 'Agregar Producto';
  if (id) {
    const p = products.find(x => x.id === id);
    document.getElementById('mpProvider').value = p.provider;
    document.getElementById('mpType').value = p.type;
    document.getElementById('mpBrand').value = p.brand;
    document.getElementById('mpDesc').value = p.desc;
    document.getElementById('mpSize').value = p.size;
    document.getElementById('mpUnit').value = p.unit || 'Caja';
    document.getElementById('mpCost').value = p.cost || '';
  } else {
    document.getElementById('mpProvider').value = "Southern Glazer's";
    document.getElementById('mpType').value = 'Tequila';
    ['mpBrand','mpDesc','mpSize','mpCost'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('mpUnit').value = 'Caja';
  }
  document.getElementById('productModal').classList.add('open');
}
function closeProductModal() { document.getElementById('productModal').classList.remove('open'); }

function saveProduct() {
  const brand = document.getElementById('mpBrand').value.trim().toUpperCase();
  const desc  = document.getElementById('mpDesc').value.trim().toUpperCase();
  const size  = document.getElementById('mpSize').value.trim().toUpperCase();
  if (!brand || !desc || !size) { showToast('⚠ Completa todos los campos'); return; }
  const data = {
    provider: document.getElementById('mpProvider').value,
    type: document.getElementById('mpType').value,
    brand, desc, size,
    unit: document.getElementById('mpUnit').value,
    cost: parseFloat(document.getElementById('mpCost').value) || 0,
    active: true
  };
  if (editingProductId) {
    const idx = products.findIndex(p => p.id === editingProductId);
    products[idx] = { ...products[idx], ...data };
  } else {
    products.push({ id: nextId++, ...data });
  }
  saveProducts();
  closeProductModal();
  renderAdminProducts();
  showToast(editingProductId ? '✅ Producto actualizado' : '✅ Producto agregado');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
